name: Release

on:
  push:
    tags:
      - "v*"

env:
  ZIG_VERSION: "0.15.2"

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: true
      matrix:
        include:
          - target: x86_64-linux-musl
            rust_target: x86_64-unknown-linux-musl
          - target: armv7-linux-musleabihf
            rust_target: armv7-unknown-linux-musleabihf

    steps:
      - uses: actions/checkout@v4

      - uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.rust_target }}

      - name: Install zig
        run: |
          ZIG_URL="https://ziglang.org/download/${{ env.ZIG_VERSION }}/zig-x86_64-linux-${{ env.ZIG_VERSION }}.tar.xz"
          curl -fsSL "$ZIG_URL" | tar -xJ -C "$RUNNER_TEMP"
          echo "$RUNNER_TEMP/zig-x86_64-linux-${{ env.ZIG_VERSION }}" >> "$GITHUB_PATH"

      - name: Install cargo-zigbuild
        run: cargo install cargo-zigbuild

      - uses: Swatinem/rust-cache@v2
        with:
          key: ${{ matrix.target }}

      - name: Build
        run: cargo zigbuild --release --target ${{ matrix.rust_target }}

      - name: Package
        shell: bash
        run: |
          TAG="${GITHUB_REF_NAME}"
          STAGING="romm-fuse-${TAG}-${{ matrix.target }}"
          mkdir -p "$STAGING"
          cp target/${{ matrix.rust_target }}/release/romm-fuse "$STAGING/"
          tar czf "${STAGING}.tar.gz" "$STAGING"
          echo "ASSET=${STAGING}.tar.gz" >> "$GITHUB_ENV"

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: romm-fuse-${{ matrix.target }}
          path: ${{ env.ASSET }}

  release:
    needs: build
    runs-on: ubuntu-latest
    steps:
      - name: Download artifacts
        uses: actions/download-artifact@v4
        with:
          path: artifacts
          merge-multiple: true

      - name: Create release
        uses: softprops/action-gh-release@v2
        with:
          generate_release_notes: true
          files: artifacts/*
